name: Deploy dbt Project to Snowflake

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  dbt-deploy:
runs-on: ubuntu-latest

```
env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
  SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
  SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

steps:
  - name: 1. Checkout repository
    uses: actions/checkout@v4

  - name: 2. Setup Python 3.12
    uses: actions/setup-python@v5
    with:
      python-version: '3.12'

  - name: 3. Install dependencies (dbt + Snowflake CLI)
    run: |
      python -m pip install --upgrade pip
      pip install dbt-snowflake snowflake-cli

  - name: 4. Create dbt profiles.yml
    run: |
      mkdir -p ~/.dbt
      cat <<EOF > ~/.dbt/profiles.yml
      my_profile:
        target: dev
        outputs:
          dev:
            type: snowflake
            account: ${SNOWFLAKE_ACCOUNT}
            user: ${SNOWFLAKE_USER}
            password: ${SNOWFLAKE_PASSWORD}
            role: ${SNOWFLAKE_ROLE}
            database: ${SNOWFLAKE_DATABASE}
            warehouse: ${SNOWFLAKE_WAREHOUSE}
            schema: ${SNOWFLAKE_SCHEMA}
            threads: 4
      EOF

  - name: 5. Install dbt dependencies
    run: dbt deps

  - name: 6. Run dbt models
    run: dbt run --profiles-dir ~/.dbt

  - name: 7. Run dbt tests
    run: dbt test --profiles-dir ~/.dbt
```
